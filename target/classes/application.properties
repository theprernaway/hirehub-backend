# ===== Server =====
server.port=8080

# ===== PostgreSQL =====
# Local dev values below. On Render/Railway, override these with environment variables
# (DB_URL, DB_USERNAME, DB_PASSWORD) instead of hardcoding.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hirehub}
spring.datasource.username=${DB_USERNAME:prernasingh}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== JWT =====
# In production, set JWT_SECRET as an environment variable (long, random string, 256+ bits)
jwt.secret=${JWT_SECRET:ThisIsADevOnlySecretKeyChangeItInProdMakeItLongEnough123456}
jwt.expiration-ms=36000000

# ===== CORS =====
# Comma-separated list of allowed frontend origins.
# Locally this defaults to the Vite dev server. On Render, set FRONTEND_URL
# to your deployed Vercel URL, e.g. https://hirehub.vercel.app
frontend.url=${FRONTEND_URL:http://localhost:5173}
